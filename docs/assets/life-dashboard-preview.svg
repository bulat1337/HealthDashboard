<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Life Dashboard preview</title>
  <desc id="desc">A sanitized dashboard preview with demo health, money, and relationship cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.42" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#edf6f8"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="72" y="64" width="1256" height="692" rx="24" fill="#ffffff" opacity="0.72"/>
  <g font-family="Fira Sans, Inter, Arial, sans-serif">
    <rect x="112" y="102" width="64" height="64" rx="8" fill="url(#brand)" filter="url(#shadow)"/>
    <path d="M144 123c-9-12-30-3-24 17 5 17 31 33 43 44 12-11 38-27 43-44 6-20-15-29-24-17-6 8-10 13-19 13s-13-5-19-13Z" fill="#fff"/>
    <text x="198" y="130" fill="#1e3a8a" font-size="42" font-weight="700">Life Dashboard</text>
    <text x="198" y="160" fill="#536273" font-size="18">Health, money, relationships and live local data</text>
    <rect x="1050" y="112" width="178" height="44" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
    <circle cx="1078" cy="134" r="7" fill="#15803d"/>
    <text x="1096" y="140" fill="#0f172a" font-size="17" font-weight="600">Live demo</text>

    <g transform="translate(112 206)">
      <rect width="1216" height="74" rx="12" fill="#eef6ff" stroke="#d8e2ef"/>
      <rect x="18" y="14" width="142" height="46" rx="8" fill="#1e40af"/>
      <text x="89" y="43" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Health</text>
      <text x="210" y="43" fill="#1e3a8a" font-size="18" font-weight="700">Money</text>
      <text x="330" y="43" fill="#1e3a8a" font-size="18" font-weight="700">Relationships</text>
    </g>

    <g transform="translate(112 324)">
      <g filter="url(#shadow)">
        <rect width="176" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Weight</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">72.4</text>
        <text x="124" y="88" fill="#536273" font-size="18">kg</text>
        <text x="22" y="124" fill="#15803d" font-size="16" font-weight="700">-0.6 this month</text>
      </g>
      <g transform="translate(196 0)" filter="url(#shadow)">
        <rect width="176" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Body fat</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">18.2</text>
        <text x="128" y="88" fill="#536273" font-size="18">%</text>
        <text x="22" y="124" fill="#1e40af" font-size="16" font-weight="700">stable</text>
      </g>
      <g transform="translate(392 0)" filter="url(#shadow)">
        <rect width="176" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Muscle</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">54.0</text>
        <text x="124" y="88" fill="#536273" font-size="18">kg</text>
        <text x="22" y="124" fill="#15803d" font-size="16" font-weight="700">+0.3 trend</text>
      </g>
      <g transform="translate(588 0)" filter="url(#shadow)">
        <rect width="176" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Water</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">61.8</text>
        <text x="128" y="88" fill="#536273" font-size="18">%</text>
        <text x="22" y="124" fill="#1e40af" font-size="16" font-weight="700">healthy range</text>
      </g>
      <g transform="translate(784 0)" filter="url(#shadow)">
        <rect width="176" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Body score</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">82</text>
        <text x="22" y="124" fill="#f59e0b" font-size="16" font-weight="700">good</text>
      </g>
      <g transform="translate(980 0)" filter="url(#shadow)">
        <rect width="236" height="148" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
        <text x="22" y="38" fill="#536273" font-size="16">Relationship</text>
        <text x="22" y="88" fill="#0f172a" font-size="42" font-weight="700">892</text>
        <text x="108" y="88" fill="#536273" font-size="18">days</text>
        <text x="22" y="124" fill="#db2777" font-size="16" font-weight="700">local config</text>
      </g>
    </g>

    <g transform="translate(112 514)" filter="url(#shadow)">
      <rect width="780" height="190" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
      <text x="28" y="42" fill="#0f172a" font-size="24" font-weight="700">Weight trend</text>
      <text x="28" y="68" fill="#536273" font-size="16">Demo values, no personal data</text>
      <path d="M56 144 C140 104, 220 136, 306 108 S478 114, 560 86 S674 96, 724 68" fill="none" stroke="#1e40af" stroke-width="6" stroke-linecap="round"/>
      <path d="M56 168H724" stroke="#d8e2ef" stroke-width="2"/>
      <path d="M56 116H724" stroke="#eef6ff" stroke-width="2"/>
    </g>
    <g transform="translate(924 514)" filter="url(#shadow)">
      <rect width="304" height="190" rx="8" fill="#ffffff" stroke="#d8e2ef"/>
      <text x="26" y="42" fill="#0f172a" font-size="24" font-weight="700">Money</text>
      <rect x="26" y="78" width="252" height="18" rx="9" fill="#dbeafe"/>
      <rect x="26" y="78" width="156" height="18" rx="9" fill="#1e40af"/>
      <rect x="26" y="118" width="252" height="18" rx="9" fill="#fef3c7"/>
      <rect x="26" y="118" width="88" height="18" rx="9" fill="#f59e0b"/>
      <text x="26" y="166" fill="#536273" font-size="16">Markdown notes to dashboard</text>
    </g>
  </g>
</svg>
